# Legacy Netlify. Ziel: Cloudflare Pages – docs/Cloudflare-Umzug-Roadmap.md
[build]
  command = "npm run build"
  publish = "dist"
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "20"

# SPA: React Router – alle Routen auf index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
