# Legacy Netlify (Rollback: Git-Tag last-stand-netlify). Ziel-Hosting: Cloudflare Pages + Lizenz-API Supabase Edge.
# Siehe docs/Cloudflare-Umzug-Roadmap.md
[build]
  command = "npm run build"
  publish = "dist"
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/license"
  to = "/.netlify/functions/license"
  status = 200
  force = true

[[redirects]]
  from = "/api/update-impressum"
  to = "/.netlify/functions/update-impressum"
  status = 200
  force = true

[[redirects]]
  from = "/api/limit-exceeded"
  to = "/.netlify/functions/limit-exceeded"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
