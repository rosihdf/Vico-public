# Wird vom Lizenzportal (Edge trigger-mandanten-db-rollout) oder manuell gestartet.
# Secrets: MANDANTEN_DB_URLS_STAGING / MANDANTEN_DB_URLS_PRODUCTION (je eine URI pro Zeile).
# Fallback Produktion: wenn PRODUCTION leer, wird MANDANTEN_DB_URLS (Legacy) genutzt.
#
# Optional (Portal-Protokoll Phase 3): run_id + LP_ROLLOUT_CALLBACK_URL + LP_ROLLOUT_CALLBACK_SECRET (Fallback: MANDANTEN_DB_ROLLOUT_CALLBACK_SECRET)
name: Mandanten-DB – Rollout (psql)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'staging = Secret STAGING; production = Secret PRODUCTION (oder Legacy)'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      sql_file:
        description: 'Relativer Pfad im Repo (z. B. supabase-complete.sql oder docs/sql/rollout/…)'
        type: string
        required: true
        default: supabase-complete.sql
      mode:
        description: 'dry_run = nur URLs listen; apply = SQL ausführen'
        type: choice
        required: true
        default: dry_run
        options:
          - dry_run
          - apply
      run_id:
        description: 'Lizenzportal mandanten_db_rollout_runs.id (leer = ohne Portal-Callback)'
        type: string
        required: false
        default: ''

jobs:
  rollout:
    runs-on: ubuntu-latest
    env:
      ROLLOUT_RUN_ID: ${{ github.event.inputs.run_id }}
      ROLLOUT_CALLBACK_URL: ${{ secrets.LP_ROLLOUT_CALLBACK_URL }}
      ROLLOUT_CALLBACK_SECRET: ${{ secrets.LP_ROLLOUT_CALLBACK_SECRET || secrets.MANDANTEN_DB_ROLLOUT_CALLBACK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SQL-Datei prüfen
        run: |
          F="${{ github.event.inputs.sql_file }}"
          if [ -z "$F" ]; then
            echo "::error::sql_file ist leer."
            exit 1
          fi
          if [[ "$F" == *".."* ]]; then
            echo "::error::sql_file darf keine .. enthalten."
            exit 1
          fi
          if [ ! -f "$F" ]; then
            echo "::error::Datei nicht gefunden: $F"
            exit 1
          fi

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PostgreSQL-Client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: URL-Liste aus Secret schreiben
        env:
          STAGING: ${{ secrets.MANDANTEN_DB_URLS_STAGING }}
          PROD: ${{ secrets.MANDANTEN_DB_URLS_PRODUCTION }}
          LEGACY: ${{ secrets.MANDANTEN_DB_URLS }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "staging" ]; then
            DATA="$STAGING"
            NAME="MANDANTEN_DB_URLS_STAGING"
          else
            DATA="$PROD"
            NAME="MANDANTEN_DB_URLS_PRODUCTION"
            if [ -z "$DATA" ] && [ -n "$LEGACY" ]; then
              DATA="$LEGACY"
              NAME="MANDANTEN_DB_URLS (Legacy, bitte auf PRODUCTION umstellen)"
            fi
          fi
          if [ -z "$DATA" ]; then
            echo "::error::Secret $NAME ist nicht gesetzt (eine Postgres-URI pro Zeile)."
            exit 1
          fi
          echo "$DATA" > mandanten-db-urls.txt

      - name: Portal-Callback Secrets (bei run_id Pflicht)
        if: ${{ github.event.inputs.run_id != '' }}
        run: |
          if [ -z "$ROLLOUT_CALLBACK_URL" ] || [ -z "$ROLLOUT_CALLBACK_SECRET" ]; then
            echo "::error::run_id gesetzt: Repository-Secrets LP_ROLLOUT_CALLBACK_URL und LP_ROLLOUT_CALLBACK_SECRET (oder Legacy MANDANTEN_DB_ROLLOUT_CALLBACK_SECRET) müssen konfiguriert sein."
            exit 1
          fi

      - name: Lizenzportal Rollout als „running“ melden
        if: ${{ github.event.inputs.run_id != '' }}
        env:
          GITHUB_RUN_HTML_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg rid "$ROLLOUT_RUN_ID" \
            --arg url "$GITHUB_RUN_HTML_URL" \
            '{op:"run_mark_running",run_id:$rid,github_run_url:$url}' \
            | curl -fsS -X POST "$ROLLOUT_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Rollout-Callback-Secret: $ROLLOUT_CALLBACK_SECRET" \
              -d @-

      - name: Trockenlauf
        if: github.event.inputs.mode == 'dry_run'
        run: node scripts/apply-mandanten-sql.mjs "${{ github.event.inputs.sql_file }}" --urls-file mandanten-db-urls.txt --dry-run

      - name: Echtlauf
        if: github.event.inputs.mode == 'apply'
        run: node scripts/apply-mandanten-sql.mjs "${{ github.event.inputs.sql_file }}" --urls-file mandanten-db-urls.txt
