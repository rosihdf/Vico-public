name: PR für CI erstellen

on:
  push:
    branches:
      - perf/auth-login-portals
      # Weitere Branches hier ergänzen, falls gewünscht

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: PR zu main erstellen oder aktualisieren
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              base: 'main'
            });
            if (pulls.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Merge ${branch} → main`,
                head: branch,
                base: 'main',
                body: 'Automatisch erstellt, um den CI-Workflow zu starten.'
              });
              console.log(`PR von ${branch} nach main erstellt.`);
            } else {
              console.log(`PR existiert bereits: ${pulls[0].html_url}`);
            }
